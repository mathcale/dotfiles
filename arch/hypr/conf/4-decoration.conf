general {
  gaps_in = 5
  gaps_out = 5
  border_size = 2
  col.active_border = 0xffcba6f7
  col.inactive_border = rgba(ffffffff)
  layout = dwindle
  allow_tearing = false
}

# ==================
# DECORATION
# ==================
decoration {
  rounding = 8
  active_opacity = 1.0
  inactive_opacity = 0.8
  fullscreen_opacity = 1.0

  blur {
    enabled = true
    size = 12
    passes = 4
    new_optimizations = on
    ignore_opacity = true
    xray = true
    # blurls = waybar
  }

  shadow {
    enabled = true
    range = 30
    render_power = 5
    offset = 0 5
    color = rgba(00000070)
  }
}
